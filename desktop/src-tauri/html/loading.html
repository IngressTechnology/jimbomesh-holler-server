<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>JimboMesh Holler</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1120;
        --accent: #14b8a6;
        --text: #e2e8f0;
        --muted: #94a3b8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.18), transparent 28rem),
          radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.12), transparent 24rem), var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
      }
      .loader {
        text-align: center;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 12px;
      }
      p {
        color: var(--muted);
        font-size: 16px;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(148, 163, 184, 0.2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 24px auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <h1>JimboMesh Holler</h1>
      <div class="spinner"></div>
      <p>Starting up... this may take a moment on first run.</p>
    </div>
  </body>
</html>
