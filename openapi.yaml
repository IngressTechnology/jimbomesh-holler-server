        Only clears `mesh_auto_connect`.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Mesh disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSuccessResponse"
              example:
                success: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/api/mesh/peers:
    get:
      tags: [Admin Mesh]
      summary: Active WebRTC peer connections
      description: Returns details of active WebRTC peer-to-peer connections with Buyers. Only populated when the Holler is connected to the mesh and processing jobs via WebRTC.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Peer connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeConnections:
                    type: integer
                    description: Number of active peer connections
                  maxConnections:
                    type: integer
                    description: Maximum allowed concurrent peer connections (MAX_PEER_CONNECTIONS)
                  jobs:
                    type: array
                    items:
                      type: object
                      properties:
                        jobId:
                          type: string
                        model:
                          type: string
                        state:
                          type: string
                          enum: [signaling, connected, streaming, complete, closed]
                        startedAt:
                          type: integer
                          description: Unix timestamp (ms)
              example:
                activeConnections: 2
                maxConnections: 10
                jobs:
                  - jobId: "job_a1b2c3d4"
                    model: "llama3.1:8b"
                    state: "streaming"
                    startedAt: 1709312400000
                  - jobId: "job_e5f6g7h8"
                    model: "nomic-embed-text"
                    state: "connected"
                    startedAt: 1709312403000
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/api/mesh/connect-stored:
    post:
      tags: [Admin Mesh]
      summary: Connect using stored API key
      description: Reconnects to the mesh using the API key already stored in SQLite. Returns 400 if no key is stored.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Connection initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSuccessResponse"
              example:
                success: true
        "400":
          description: No stored mesh API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
              example:
                error:
                  code: no_key
                  message: "No stored mesh API key. Enter one first."
                  type: client_error
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          description: SQLite not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"

  /admin/api/mesh/forget-key:
    post:
      tags: [Admin Mesh]
      summary: Clear stored mesh API key
      description: Removes the stored mesh API key from SQLite. The user will need to re-enter the key to connect again.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Key cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSuccessResponse"
              example:
                success: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/api/mesh/reconnect:
    post:
      tags: [Admin Mesh]
      summary: Reconnect to mesh
      description: Stops the current mesh connection and reconnects using the stored API key. Returns 400 if no key is stored.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Reconnection initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSuccessResponse"
              example:
                success: true
        "400":
          description: No stored mesh API key or no active connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/api/restart:
    post:
      tags: [Admin Core]
      summary: Restart Holler or Ollama
      description: |
        Restarts the specified target. For `holler`, calls `process.exit(0)` so the
        container or process manager restarts the service. For `ollama`, sends `pkill`
        on macOS Performance Mode (launchctl/brew auto-restarts); inside Docker, logs
        a message to restart the container manually. Response is sent before the restart.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRestartRequest"
            example:
              target: holler
      responses:
        "200":
          description: Restart initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRestartResponse"
              example:
                success: true
                message: "Restarting holler..."
        "401":
          $ref: "#/components/responses/Unauthorized"
