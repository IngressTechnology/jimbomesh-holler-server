  /v1/documents/ask:
    post:
      tags: [Public Documents]
      summary: Ask questions over indexed documents
      description: |
        Returns JSON when no relevant sources are found, otherwise returns SSE stream:
        - `type: sources`
        - `type: token`
        - `type: done`
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicDocumentQueryRequest"
      responses:
        "200":
          description: Answer as JSON or SSE stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"type":"sources","sources":[{"filename":"guide.md","chunk_index":0,"score":0.91}]}

                  data: {"type":"token","content":"Based on your documents, ..."}

                  data: {"type":"done"}
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          description: Ask pipeline failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "501":
          description: Document pipeline not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"

