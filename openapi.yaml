openapi: 3.0.3
info:
  title: JimboMesh Holler Server API
  version: 0.7.2
  contact:
    email: security@jimbomesh.ai
  description: |
    Full API surface for JimboMesh Holler Server.

    - OpenAI-compatible endpoints (`/v1/*`)
    - Native Ollama proxy endpoints (`/api/*`)
    - Admin endpoints (`/admin/api/*`)
    - Document RAG endpoints (admin + public)

    Authentication:
    - Inference/public endpoints accept `X-API-Key` or `Authorization: Bearer ...`.
    - Admin endpoints require `X-API-Key` matching admin-effective key.
    - `/health`, `/readyz`, and `/admin/api/branding` are unauthenticated.

servers:
  - url: http://localhost:1920
    description: API gateway
  - url: http://your-server-ip:1920
    description: LAN gateway (replace with your server IP)
  - url: http://localhost:9090
    description: Health server (for /healthz and /status)

tags:
  - name: Health
  - name: OpenAI
  - name: Ollama Proxy
  - name: Public Documents
  - name: Admin Core
  - name: Admin Stats
  - name: Admin Models
  - name: Admin Security
  - name: Admin Marketplace
  - name: Admin Documents
  - name: Admin Collections
  - name: Admin Tokens
  - name: Admin Mesh

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token or JWT

  responses:
    Unauthorized:
      description: Missing or invalid auth credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StructuredError"
          example:
            error:
              code: auth_required
              message: Admin API key required
              type: client_error
    Forbidden:
      description: Authenticated but not allowed for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StructuredError"

  schemas:
    StructuredError:
      type: object
      properties:
        error:
          type: object
          required: [code, message, type]
          properties:
            code:
              type: string
              example: auth_required
            message:
              type: string
              example: "Missing X-API-Key or Authorization: Bearer header"
            type:
              type: string
              example: client_error
            retry_after:
              type: integer
              nullable: true
      required: [error]

    HealthOk:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time

    ReadyzShuttingDown:
      type: object
      properties:
        status:
          type: string
          example: shutting_down

    OpenAIEmbeddingsRequest:
      type: object
      required: [input]
      properties:
        model:
          type: string
          example: nomic-embed-text
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
      example:
        model: nomic-embed-text
        input:
          - "First text"
          - "Second text"

    OpenAIEmbeddingsResponse:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
                example: embedding
              embedding:
                type: array
                items:
                  type: number
              index:
                type: integer
        model:
          type: string
          example: nomic-embed-text
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer

    OpenAIModelListResponse:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: llama3.1:8b
              object:
                type: string
                example: model
              created:
                type: integer
              owned_by:
                type: string
                example: jimbomesh-holler

    OpenAIChatRequest:
      type: object
      required: [messages]
      properties:
        model:
          type: string
          nullable: true
          description: Optional. If omitted, server auto-selects default chat model.
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        stream:
          type: boolean
          default: false
        temperature:
          type: number
        top_p:
          type: number
        max_tokens:
          type: integer
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        presence_penalty:
          type: number
        frequency_penalty:
          type: number
      example:
        model: llama3.1:8b
        stream: false
        messages:
          - role: system
            content: "You are concise."
          - role: user
            content: "Explain vector embeddings in one paragraph."

    OpenAIChatResponse:
      type: object
      properties:
        id:
          type: string
          example: chatcmpl-holler-123
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                    example: assistant
                  content:
                    type: string
              finish_reason:
                type: string
                example: stop
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    OllamaEmbedRequest:
      type: object
      required: [model, input]
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    OllamaEmbedResponse:
      type: object
      properties:
        model:
          type: string
        embeddings:
          type: array
          items:
            type: array
            items:
              type: number

    OllamaGenerateRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
        prompt:
          type: string
        stream:
          type: boolean
          default: true
        options:
          type: object
          additionalProperties: true

    OllamaChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
              content:
                type: string
        stream:
          type: boolean
          default: true
        options:
          type: object
          additionalProperties: true

    TagsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              model:
                type: string
              modified_at:
                type: string
                format: date-time
              size:
                type: integer
              digest:
                type: string
              details:
                type: object
                additionalProperties: true

    PsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            type: object
            additionalProperties: true

    PublicDocumentQueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        collection:
          type: string
          default: documents
        limit:
          type: integer
          default: 5
      example:
        query: "What are the GPU requirements?"
        collection: documents
        limit: 5

    PublicDocumentQueryResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              score:
                type: number
              payload:
                type: object
                additionalProperties: true

    AdminStatusResponse:
      type: object
      properties:
        healthy:
          type: boolean
        ollama_latency_ms:
          type: integer
        model_count:
          type: integer
        running_models:
          type: integer
        uptime_seconds:
          type: integer
        recent_requests:
          type: integer
        total_requests:
          type: integer
          nullable: true
        db_size_bytes:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true

    AdminConfigResponse:
      type: object
      properties:
        server:
          type: object
          additionalProperties: true
        ollama:
          type: object
          additionalProperties: true
        health:
          type: object
          additionalProperties: true
        security:
          type: object
          additionalProperties: true
        branding:
          type: object
          additionalProperties: true

    AdminActivityEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        method:
          type: string
        path:
          type: string
        status:
          type: integer
        ip:
          type: string
        duration_ms:
          type: integer
        auth_type:
          type: string
          nullable: true

    AdminActivityResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/AdminActivityEntry"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    SettingItem:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        updated_at:
          type: string

    SettingsResponse:
      type: object
      properties:
        settings:
          type: array
          items:
            $ref: "#/components/schemas/SettingItem"

    UpdateSettingRequest:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean

    UpdateSettingsBatchRequest:
      type: object
      required: [settings]
      properties:
        settings:
          type: array
          items:
            $ref: "#/components/schemas/UpdateSettingRequest"

    AdminApiKeyMaskedResponse:
      type: object
      properties:
        masked:
          type: string

    AdminApiKeyRegenerateRequest:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: string
          enum: [hellyeah]

    AdminApiKeyRegenerateResponse:
      type: object
      properties:
        success:
          type: boolean
        key:
          type: string
        masked:
          type: string

    AdminQdrantKeyResponse:
      type: object
      properties:
        set:
          type: boolean
        masked:
          type: string

    AdminStatsResponse:
      type: object
      properties:
        global:
          type: object
          additionalProperties: true
        models:
          type: array
          items:
            type: object
            additionalProperties: true
        summary:
          type: object
          nullable: true
          additionalProperties: true

    AdminStatsModelResponse:
      type: object
      properties:
        model:
          type: string
        stats:
          type: object
          additionalProperties: true
        hourly:
          type: array
          items:
            type: object
            additionalProperties: true

    AdminStatsRequestsResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            type: object
            description: Request stats row (request_stats table). May include connection_type (webrtc|http) for Mesh jobs
            additionalProperties: true

    AdminStatsHourlyResponse:
      type: object
      properties:
        hourly:
          type: array
          items:
            type: object
            additionalProperties: true

    AdminStatsResetRequest:
      type: object
      properties:
        model:
          type: string
          description: Optional model name. If omitted, reset all model stats.

    AdminStatsPricingRequest:
      type: object
      required: [model, input_per_1k]
      properties:
        model:
          type: string
        input_per_1k:
          type: number
        output_per_1k:
          type: number
          nullable: true

    AdminStatsPricingResponse:
      type: object
      properties:
        pricing:
          type: object
          additionalProperties: true

    AdminSystemResponse:
      type: object
      additionalProperties: true

    AdminMeshStatusResponse:
      type: object
      properties:
        state:
          type: string
          enum: [disconnected, connecting, connected, error, reconnecting]
        connected:
          type: boolean
        connecting:
          type: boolean
        mode:
          type: string
          enum: [off-grid, connecting, mesh-contributor]
        connectionMode:
          type: string
          enum: [HTTP Polling, WebSocket]
          description: Active job transport path used by the connector
        reconnectAttempt:
          type: integer
          minimum: 0
          description: Current management WebSocket reconnect attempt counter
        nextReconnectAt:
          type: integer
          nullable: true
          description: Unix timestamp (ms) when the next reconnect attempt is scheduled
        meshUrl:
          type: string
          format: uri
        hollerName:
          type: string
          nullable: true
        hollerId:
          type: string
          nullable: true
        autoConnect:
          type: boolean
        hasStoredMeshKey:
          type: boolean
          description: Whether a mesh API key is persisted in SQLite for one-click reconnect
        lastHeartbeat:
          type: integer
          nullable: true
          description: Unix timestamp (ms) of most recent successful heartbeat
        jobsProcessed:
          type: integer
        moonshineEarned:
          type: number
        errorMessage:
          type: string
          nullable: true
        log:
          type: array
          items:
            type: object
            properties:
              time:
                type: integer
                description: Unix timestamp (ms)
              type:
                type: string
                enum: [info, success, warning, error]
              message:
                type: string
        peerConnections:
          type: object
          nullable: true
          properties:
            activeConnections:
              type: integer
            maxConnections:
              type: integer
            jobs:
              type: array
              items:
                type: object
                properties:
                  jobId:
                    type: string
                  model:
                    type: string
                  state:
                    type: string
                    enum: [signaling, connected, streaming, complete, closed]
                  startedAt:
                    type: integer
                    description: Unix timestamp (ms)
      additionalProperties: true

    AdminRestartRequest:
      type: object
      properties:
        target:
          type: string
          enum: [holler, ollama]
          default: holler

    AdminRestartResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    AdminMeshConnectRequest:
      type: object
      required: [apiKey]
      properties:
        apiKey:
          type: string
        meshUrl:
          type: string
          format: uri
          description: Coordinator URL (e.g. https://api.jimbomesh.ai). Maps to JIMBOMESH_COORDINATOR_URL
        hollerName:
          type: string
        autoConnect:
          type: boolean

    AdminMeshSettingsRequest:
      type: object
      properties:
        meshUrl:
          type: string
          format: uri
          description: Coordinator URL. Saved for next connect
        hollerName:
          type: string
        autoConnect:
          type: boolean

    AdminMeshAutoConnectRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Enable or disable mesh auto-connect on startup

    AdminMeshAutoConnectResponse:
      type: object
      properties:
        success:
          type: boolean
        autoConnect:
          type: boolean

    AdminSuccessResponse:
      type: object
      properties:
        success:
          type: boolean

    AdminGpuInfoResponse:
      type: object
      properties:
        mode:
          type: string
          enum: [cpu, nvidia, metal, metal-native]
        system:
          type: object
          properties:
            total_mb:
              type: integer
            free_mb:
              type: integer
        gpu:
          type: object
          nullable: true
          properties:
            name:
              type: string
            type:
              type: string
            vram_total_mb:
              type: integer
            vram_used_mb:
              type: integer
            vram_free_mb:
              type: integer
            offload_pct:
              type: integer
              nullable: true
        ollama_gpu:
          type: object
          nullable: true
          properties:
            running_models:
              type: integer
            total_size_bytes:
              type: integer
            total_vram_bytes:
              type: integer
            gpu_offload_pct:
              type: integer

    AdminGitHubStatusResponse:
      type: object
      properties:
        configured:
          type: boolean

    AdminGitHubIssueRequest:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [bug, feature]
        title:
          type: string
        description:
          type: string
        steps:
          type: string
        expected:
          type: string
        actual:
          type: string
        useCase:
          type: string

    AdminGitHubIssueResponse:
      type: object
      properties:
        success:
          type: boolean
        issue_number:
          type: integer
        url:
          type: string
          format: uri

    PullRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: llama3.1:8b

    ShowRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    AdminAuthStatusResponse:
      type: object
      properties:
        tier1:
          type: object
          properties:
            enabled:
              type: boolean
        tier2:
          type: object
          properties:
            enabled:
              type: boolean
            token_count:
              type: integer
        tier3:
          type: object
          properties:
            configured:
              type: boolean
            domain:
              type: string
              nullable: true
            audience:
              type: string
              nullable: true

    TokenCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        rpm:
          type: integer
        rph:
          type: integer
        expires_at:
          type: string
          nullable: true

    TokenCreateResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        permissions:
          type: array
          items:
            type: string
        rpm:
          type: integer
        rph:
          type: integer
        expires_at:
          type: string
          nullable: true
        created_at:
          type: string
        raw:
          type: string
          description: Raw token value shown only at creation time.

    AdminDocument:
      type: object
      additionalProperties: true

    AdminDocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/AdminDocument"

    AdminDocumentQueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        collection:
          type: string
        limit:
          type: integer
        model:
          type: string
          description: Chat model for RAG Q&A (documents/ask). Defaults to llama3.1:8b

    AdminDocumentQueryResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              score:
                type: number
              payload:
                type: object
                additionalProperties: true

    CreateCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        size:
          type: integer
          default: 768
        distance:
          type: string
          default: Cosine

paths:
  /health:
    get:
      tags: [Health]
      summary: Gateway liveness
      security: []
      responses:
        "200":
          description: Gateway is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"

  /readyz:
    get:
      tags: [Health]
      summary: Gateway readiness
      security: []
      responses:
        "200":
          description: Gateway is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"
        "503":
          description: Gateway is draining/shutting down
          headers:
            Retry-After:
              schema:
                type: string
                example: "5"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzShuttingDown"

  /healthz:
    get:
      tags: [Health]
      summary: Health-server liveness probe
      security: []
      responses:
        "200":
          description: Health check passed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /status:
    get:
      tags: [Health]
      summary: Health-server status payload
      security: []
      responses:
        "200":
          description: Status payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/embeddings:
    post:
      tags: [OpenAI]
      summary: OpenAI-compatible embeddings
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIEmbeddingsRequest"
      responses:
        "200":
          description: Embedding vectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIEmbeddingsResponse"
        "400":
          description: Invalid request / batch too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "429":
          description: Rate limited or queue full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "502":
          description: Backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "504":
          description: Backend timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"

  /v1/models:
    get:
      tags: [OpenAI]
      summary: OpenAI-compatible model list
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: OpenAI-style model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIModelListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Model list unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"

  /v1/chat/completions:
    post:
      tags: [OpenAI]
      summary: OpenAI-compatible chat completions
      description: |
        If `stream=true`, response is `text/event-stream` with `data: ...` chunks and terminal `[DONE]`.
        If `stream=false`, response is a standard JSON `chat.completion` object.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIChatRequest"
      responses:
        "200":
          description: Chat completion (JSON or stream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIChatResponse"
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"id":"chatcmpl-holler-123","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}

                  data: {"id":"chatcmpl-holler-123","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}

                  data: {"id":"chatcmpl-holler-123","object":"chat.completion.chunk","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}

                  data: [DONE]
        "400":
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Requested model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "429":
          description: Rate limited or queue full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "502":
          description: Backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "503":
          description: Model list unavailable during validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StructuredError"
        "504":
          description: Backend timeout
          content:
            application/json:
              schema:
