name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the details below so we can reproduce and fix the issue.
  - type: input
    id: version
    attributes:
      label: Holler Version
      description: "Run `docker exec holler cat /app/version.txt` or check Admin UI footer"
      placeholder: "v0.2.0"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - setup.sh (Linux/macOS)
        - setup.ps1 (Windows)
        - Docker Compose (manual)
        - Docker run (manual)
    validations:
      required: true
  - type: dropdown
    id: gpu
    attributes:
      label: GPU Type
      options:
        - NVIDIA (CUDA)
        - Apple Silicon (Metal)
        - AMD (ROCm)
        - CPU only
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 22.04 / macOS 15.3 / Windows 11"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model (if applicable)
      placeholder: "llama3.2:3b, mistral:7b, etc."
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Paste relevant logs from `docker logs holler` or the Admin UI logs panel"
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am running the latest version
          required: false
