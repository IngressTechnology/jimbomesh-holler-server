name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Lowercase repository
        id: repo
        run: echo "lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lowercase }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.lowercase }}:latest

  server-bundle:
    name: Server Bundle (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: Linux
            archive: holler-server-bundle-linux-x64.tar.gz
          - platform: windows-latest
            label: Windows
            archive: holler-server-bundle-windows-x64.tar.gz
          - platform: macos-latest
            label: macOS
            archive: holler-server-bundle-macos-universal.tar.gz
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install native build prerequisites
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 make g++ pkg-config

      - name: Install production dependencies
        run: |
          npm ci --omit=dev --ignore-scripts

      - name: Package server bundle
        shell: bash
        run: |
          tar czf "${{ matrix.archive }}" \
            --exclude='test' \
            --exclude='desktop' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules/.cache' \
            --exclude='*.log' \
            *.js \
            admin \
            scripts \
            node_modules \
            package.json \
            package-lock.json \
            .env.example \
            openapi.yaml

      - name: Upload server bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-bundle-${{ matrix.label }}
          path: ${{ matrix.archive }}

  publish-server-bundles:
    name: Publish Server Bundles
    needs: [server-bundle]
    runs-on: ubuntu-latest
    steps:
      - name: Download all server bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-bundle-*
          merge-multiple: true

      - name: Create or update release with server bundles
        uses: softprops/action-gh-release@v2
        with:
          name: JimboMesh Holler Server ${{ github.ref_name }}
          body: See [CHANGELOG.md](https://github.com/IngressTechnology/jimbomesh-holler-server/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: |
            holler-server-bundle-linux-x64.tar.gz
            holler-server-bundle-windows-x64.tar.gz
            holler-server-bundle-macos-universal.tar.gz

  tauri-build:
    name: Desktop (${{ matrix.label }})
    needs: [publish-server-bundles]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            label: Linux
            args: ''
          - platform: windows-latest
            label: Windows
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install desktop dependencies
        working-directory: desktop
        run: |
          npm ci --ignore-scripts

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          RUSTFLAGS: '-A warnings'
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: 'JimboMesh Holler Server v__VERSION__'
          releaseBody: 'See [CHANGELOG.md](https://github.com/IngressTechnology/jimbomesh-holler-server/blob/main/CHANGELOG.md) for details.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
